name: Publicar no GitHub Pages

on:
  push:
    branches: ["claude/trusting-turing-n6yckm"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar o Pages (ativa automaticamente)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
